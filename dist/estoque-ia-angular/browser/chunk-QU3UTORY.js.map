<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold tracking-tight">Cadastro de Materiais</h1>
    <p class="text-sm text-muted-foreground">Adicione um novo produto ao seu estoque.</p>
  </div>

  <div class="rounded-xl border bg-card shadow">
    <div class="flex flex-col space-y-1.5 p-6">
      <h3 class="flex items-center gap-2 text-base font-semibold">
        <app-icon name="package-plus" class="size-4" />
        Dados do Produto
      </h3>
    </div>
    <div class="p-6 pt-0">
      <form class="grid grid-cols-1 gap-4 sm:grid-cols-2" (submit)="submit($event)">
        <div class="space-y-2 sm:col-span-2">
          <label class="text-sm font-medium">Código de Barras / SKU *</label>
          <div class="flex gap-2">
            <input class="flex h-9 w-full rounded-md border px-3 text-sm" [(ngModel)]="sku" name="sku" placeholder="Ex: 7891234567890" />
            <button type="button" class="inline-flex h-9 shrink-0 items-center justify-center gap-2 rounded-md bg-secondary px-4 text-sm" (click)="scanOpen = true">
              <app-icon name="scan-line" class="size-4" />
              Escanear
            </button>
          </div>
        </div>
        <div class="space-y-2 sm:col-span-2">
          <label class="text-sm font-medium">Nome do Produto *</label>
          <input class="flex h-9 w-full rounded-md border px-3 text-sm" [(ngModel)]="name" name="name" />
        </div>
        <div class="space-y-2">
          <label class="text-sm font-medium">Categoria *</label>
          <select class="flex h-9 w-full rounded-md border px-3 text-sm" [(ngModel)]="category" name="category">
            <option value="">Selecione</option>
            @for (c of categories; track c) {
              <option [value]="c">{{ c }}</option>
            }
          </select>
        </div>
        <div class="space-y-2">
          <label class="text-sm font-medium">Unidade de Medida</label>
          <select class="flex h-9 w-full rounded-md border px-3 text-sm" [(ngModel)]="unit" name="unit">
            @for (u of units; track u) {
              <option [value]="u">{{ u }}</option>
            }
          </select>
        </div>
        <div class="space-y-2">
          <label class="text-sm font-medium">Quantidade Inicial</label>
          <input type="number" min="0" class="flex h-9 w-full rounded-md border px-3 text-sm" [(ngModel)]="qty" name="qty" />
        </div>
        <div class="space-y-2">
          <label class="text-sm font-medium">Quantidade Mínima (Alerta)</label>
          <input type="number" min="0" class="flex h-9 w-full rounded-md border px-3 text-sm" [(ngModel)]="minQty" name="minQty" />
        </div>
        <div class="space-y-2 sm:col-span-2">
          <label class="text-sm font-medium">Preço de Custo (R$)</label>
          <input type="number" min="0" step="0.01" class="flex h-9 w-full rounded-md border px-3 text-sm" [(ngModel)]="cost" name="cost" />
        </div>
        <div class="space-y-2 sm:col-span-2">
          <label class="text-sm font-medium">Descrição</label>
          <textarea rows="3" class="flex w-full rounded-md border px-3 py-2 text-sm" [(ngModel)]="description" name="description"></textarea>
        </div>
        <div class="flex justify-end sm:col-span-2">
          <button type="submit" class="inline-flex h-10 items-center justify-center gap-2 rounded-md bg-primary px-8 text-sm font-medium text-primary-foreground">
            <app-icon name="package-plus" class="size-4" />
            Cadastrar Material
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<app-scanner-dialog [open]="scanOpen" (openChange)="scanOpen = $event" (scan)="onScan($event)" />
